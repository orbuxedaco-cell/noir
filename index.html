<script>
document.addEventListener("DOMContentLoaded", () => {

  /* =========================
     🔥 COLLAGE + RANDOM FLASH
  ========================= */

  const images = Array.from(document.querySelectorAll(".collage img"));
  const flash = document.getElementById("flash");

  const basePath = "assets/img/";

  let usedImages = [];
  const MAX_HISTORY = 6;

  function randomFlash() {
    const randomIndex = Math.floor(Math.random() * images.length);
    const img = images[randomIndex];

    // flash blanco
    flash.classList.add("active");
    img.style.filter = "brightness(1.8)";

    setTimeout(() => {
      let randomNumber;

      do {
        randomNumber = Math.floor(Math.random() * 28) + 1;
      } while (usedImages.includes(randomNumber));

      usedImages.push(randomNumber);
      if (usedImages.length > MAX_HISTORY) usedImages.shift();

      // 🔥 AQUÍ ESTÁ EL CAMBIO IMPORTANTE
      img.src = basePath + "img" + randomNumber + ".jpg";
    }, 150);

    setTimeout(() => {
      img.style.filter = "grayscale(100%)";
    }, 300);

    setTimeout(() => {
      flash.classList.remove("active");
    }, 400);
  }

  // cada 1s
  setInterval(randomFlash, 1000);

  /* =========================
     🎲 RANDOM ORDEN IMÁGENES
  ========================= */

  for (let i = images.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [images[i], images[j]] = [images[j], images[i]];
  }

  images.forEach((img, index) => {
    img.style.animationDelay = (index * 0.1) + "s";
  });

  /* =========================
     🖤 LOGO NOIR
  ========================= */

  const center = document.querySelector(".center");

  setTimeout(() => {
    center.classList.add("show");
  }, 2200);

});
</script>
